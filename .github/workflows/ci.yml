name: CI/CD Pipeline

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  frontend-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci

    - name: Run frontend lint
      run: |
        cd frontend
        npm run lint

    - name: Run frontend unit tests
      run: |
        cd frontend
        npm run test

    - name: Install Playwright browser
      run: |
        cd frontend
        npx playwright install --with-deps chromium

    - name: Run frontend E2E tests
      run: |
        cd frontend
        npm run test:e2e

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run linting (Ruff)
      run: |
        pip install ruff
        ruff check src/ tests/

    - name: Format check (Black)
      run: |
        pip install black
        black --check src/ tests/

    - name: Type checking (mypy)
      run: |
        pip install mypy
        mypy src/ || true

    - name: Run unit tests
      run: |
        pytest tests/ -v --cov=src/ --cov-report=xml --cov-report=term

    - name: Enforce API coverage threshold
      if: matrix.python-version == '3.11'
      run: |
        pytest tests/test_api_main.py --cov=src/api --cov-report=term-missing --cov-fail-under=100 -q

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  code-quality:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install ruff black

    - name: Check for hardcoded credentials
      run: |
        # Check for common credential patterns
        ! grep -r "AKIA\|aws_access_key\|aws_secret_key" src/ tests/ || exit 1
        ! grep -r "private_key\|password.*=" src/ tests/ || exit 1

    - name: Verify documentation is updated
      run: |
        # This is a soft check - warns but doesn't fail
        echo "⚠️  Reminder: Ensure documentation in docs/ and docs_ja/ is updated"

  branch-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
    - name: Check branch target
      run: |
        if [ "${{ github.base_ref }}" = "main" ]; then
          echo "✅ PR targets develop before main - Correct!"
        fi

    - name: Verify issue linkage
      run: |
        PR_BODY="${{ github.event.pull_request.body }}"
        if [[ ! "$PR_BODY" =~ (#[0-9]+|Closes|Fixes|Relates) ]]; then
          echo "⚠️  Warning: PR should reference related issues with 'Closes #123' or 'Relates to #456'"
        fi

  security-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install security scanning tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit[toml] safety

    - name: Run Bandit security scanner
      run: |
        bandit -r src/ -f json -o bandit-report.json || true
        bandit -r src/ --severity-level medium || true

    - name: Check dependency vulnerabilities with Safety
      run: |
        safety scan --json --output safety-report.json || true
        safety scan || true

    - name: Upload security reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json
        retention-days: 30
